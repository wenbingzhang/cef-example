name: Multi-Platform Build

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  # macOS Build (x64)
  build-macos-x64:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install cmake ninja || true

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64

    - name: Build
      uses: nick-invision/retry@v2
      with:
        timeout_minutes: 30
        max_attempts: 3
        command: |
          cd build
          cmake --build . --config Release --parallel $(sysctl -n hw.ncpu)

    - name: Package artifacts
      run: |
        cd build
        mkdir -p package
        if [ -d "Release/cef.app" ]; then
          cp -R Release/cef.app package/
        elif [ -d "cef.app" ]; then
          cp -R cef.app package/
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cef-macos-x64
        path: build/package/
        retention-days: 7

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: macos-x64-build-logs
        path: build/CMakeFiles/*.log
        retention-days: 7

  # macOS Build (ARM64)
  build-macos-arm64:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install cmake ninja || true

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64

    - name: Build
      uses: nick-invision/retry@v2
      with:
        timeout_minutes: 30
        max_attempts: 3
        command: |
          cd build
          cmake --build . --config Release --parallel $(sysctl -n hw.ncpu)

    - name: Package artifacts
      run: |
        cd build
        mkdir -p package
        if [ -d "Release/cef.app" ]; then
          cp -R Release/cef.app package/
        elif [ -d "cef.app" ]; then
          cp -R cef.app package/
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cef-macos-arm64
        path: build/package/
        retention-days: 7

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: macos-arm64-build-logs
        path: build/CMakeFiles/*.log
        retention-days: 7

  # Windows Build (x64)
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2

    - name: Configure CMake
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path build
        cd build
        cmake .. -A x64

    - name: Build
      uses: nick-invision/retry@v2
      with:
        timeout_minutes: 30
        max_attempts: 3
        command: |
          cd build
          cmake --build . --config Release --parallel $env:NUMBER_OF_PROCESSORS

    - name: Package artifacts
      shell: pwsh
      run: |
        cd build
        New-Item -ItemType Directory -Force -Path package

        # Copy executable
        if (Test-Path "Release/cef.exe") {
          Copy-Item "Release/cef.exe" package/
        }

        # Copy CEF DLLs from third_party/cef
        $cefDir = Get-ChildItem -Path "../third_party/cef" -Filter "cef_binary_*_windows64" -Directory | Select-Object -First 1
        if ($cefDir) {
          $cefReleaseDir = Join-Path $cefDir.FullName "Release"
          if (Test-Path $cefReleaseDir) {
            Copy-Item "$cefReleaseDir/*.dll" package/
            Copy-Item "$cefReleaseDir/*.bin" package/
            Copy-Item "$cefReleaseDir/*.json" package/
          }
        }

        # Copy CEF resources
        $cefResourceDir = Join-Path $cefDir.FullName "Resources"
        if (Test-Path $cefResourceDir) {
          Copy-Item "$cefResourceDir/*.pak" package/
          Copy-Item "$cefResourceDir/*.dat" package/
          if (Test-Path "$cefResourceDir/locales") {
            Copy-Item -Recurse "$cefResourceDir/locales" package/
          }
        }

        # Copy application resources
        if (Test-Path "Release/resources") {
          Copy-Item -Recurse "Release/resources" package/
        }

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cef-windows-x64
        path: build/package/
        retention-days: 7

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64-build-logs
        path: build/CMakeFiles/*.log
        retention-days: 7

  # Windows Build (Win32)
  build-windows-x86:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2

    - name: Configure CMake
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path build
        cd build
        cmake .. -A Win32

    - name: Build
      uses: nick-invision/retry@v2
      with:
        timeout_minutes: 30
        max_attempts: 3
        command: |
          cd build
          cmake --build . --config Release --parallel $env:NUMBER_OF_PROCESSORS

    - name: Package artifacts
      shell: pwsh
      run: |
        cd build
        New-Item -ItemType Directory -Force -Path package

        # Copy executable
        if (Test-Path "Release/cef.exe") {
          Copy-Item "Release/cef.exe" package/
        }

        # Copy CEF DLLs from third_party/cef (32-bit)
        $cefDir = Get-ChildItem -Path "../third_party/cef" -Filter "cef_binary_*_windows32" -Directory | Select-Object -First 1
        if ($cefDir) {
          $cefReleaseDir = Join-Path $cefDir.FullName "Release"
          if (Test-Path $cefReleaseDir) {
            Copy-Item "$cefReleaseDir/*.dll" package/
            Copy-Item "$cefReleaseDir/*.bin" package/
            Copy-Item "$cefReleaseDir/*.json" package/
          }
        }

        # Copy CEF resources
        $cefResourceDir = Join-Path $cefDir.FullName "Resources"
        if (Test-Path $cefResourceDir) {
          Copy-Item "$cefResourceDir/*.pak" package/
          Copy-Item "$cefResourceDir/*.dat" package/
          if (Test-Path "$cefResourceDir/locales") {
            Copy-Item -Recurse "$cefResourceDir/locales" package/
          }
        }

        # Copy application resources
        if (Test-Path "Release/resources") {
          Copy-Item -Recurse "Release/resources" package/
        }

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cef-windows-x86
        path: build/package/
        retention-days: 7

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: windows-x86-build-logs
        path: build/CMakeFiles/*.log
        retention-days: 7
